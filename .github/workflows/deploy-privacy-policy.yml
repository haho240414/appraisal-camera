name: Deploy Privacy Policy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "privacy-policy.html"
      - ".github/workflows/deploy-privacy-policy.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy privacy policy to GitHub Pages
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site
        run: |
          mkdir -p public
          cp privacy-policy.html public/index.html
          cp privacy-policy.html public/privacy-policy.html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
