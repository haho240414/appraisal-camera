name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build APK
        working-directory: android-app
        run: gradle :app:assembleDebug --no-daemon

      - name: Run Android lint
        working-directory: android-app
        run: gradle :app:lintDebug --no-daemon

      - name: Verify APK package metadata
        run: |
          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"
          test -s "$APK"
          "$ANDROID_HOME/build-tools/35.0.0/aapt" dump badging "$APK" | tee apk-badging.txt
          grep "package: name='com.codex.appraisalcamera'" apk-badging.txt
          grep "launchable-activity: name='com.codex.appraisalcamera.MainActivity'" apk-badging.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: appraisal-camera-screen-debug-apk
          path: android-app/app/build/outputs/apk/debug/app-debug.apk
