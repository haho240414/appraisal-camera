name: Release Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-android-apk-main
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        working-directory: android-app
        run: gradle :app:assembleDebug --no-daemon

      - name: Run Android lint
        working-directory: android-app
        continue-on-error: true
        run: gradle :app:lintDebug --no-daemon

      - name: Verify APK package metadata
        run: |
          APK="android-app/app/build/outputs/apk/debug/app-debug.apk"
          test -s "$APK"
          AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -n 1)"
          "$AAPT" dump badging "$APK" | tee apk-badging.txt
          grep "package: name='com.codex.appraisalcamera'" apk-badging.txt
          grep "launchable-activity: name='com.codex.appraisalcamera.MainActivity'" apk-badging.txt

      - name: Prepare APK
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk appraisalcamera-camera-screen.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="camera-screen-apk-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" appraisalcamera-camera-screen.apk \
            --title "Camera Screen APK #${GITHUB_RUN_NUMBER}" \
            --notes "카메라 화면에서 바로 토지/건물/제시외와 기호를 선택하는 버전입니다. 휴대폰에서 appraisalcamera-camera-screen.apk 파일을 내려받아 설치하세요."
