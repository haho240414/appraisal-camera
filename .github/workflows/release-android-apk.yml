name: Release Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build APK
        working-directory: android-app
        run: gradle :app:assembleDebug --no-daemon

      - name: Prepare APK
        run: cp android-app/app/build/outputs/apk/debug/app-debug.apk appraisalcamera.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="apk-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" appraisalcamera.apk \
            --title "Appraisal Camera APK #${GITHUB_RUN_NUMBER}" \
            --notes "갤럭시에 설치할 APK입니다. 휴대폰에서 appraisalcamera.apk 파일을 내려받아 설치하세요."
