name: Release Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    # 웹 프리뷰/문서 변경은 Android APK 빌드와 무관하므로 빌드 트리거에서 제외.
    paths-ignore:
      - "**/*.md"
      - "*.html"
      - "*.css"
      - "app.js"
  pull_request:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "*.html"
      - "*.css"
      - "app.js"

permissions:
  contents: write

concurrency:
  group: release-android-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Build and publish APK
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    env:
      # versionCode 는 run number 로 자동 증가 → 사용자 OS가 정상 업데이트로 인식.
      APP_VERSION_CODE: ${{ github.run_number }}
      APP_VERSION_NAME: 1.0.${{ github.run_number }}
      HAS_RELEASE_SIGNING: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' && secrets.ANDROID_KEY_PASSWORD != '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Require release signing secrets
        if: github.event_name != 'pull_request' && env.HAS_RELEASE_SIGNING != 'true'
        run: |
          echo "::error::업데이트 설치가 가능한 APK를 만들려면 ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD GitHub Secrets가 필요합니다."
          echo "::error::android-app/README.md의 '기존 앱 위에 업데이트 설치되게 만들기' 안내에 따라 Secrets를 먼저 등록하세요."
          exit 1

      - name: Decode release signing key
        if: env.HAS_RELEASE_SIGNING == 'true'
        run: |
          mkdir -p android-app/keystore
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android-app/keystore/release.jks
          test -s android-app/keystore/release.jks

      - name: Build APK
        working-directory: android-app
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android-app/keystore/release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "${HAS_RELEASE_SIGNING}" = "true" ]; then
            echo "Building release APK with stable signing key."
            gradle :app:assembleRelease --no-daemon
          else
            echo "::warning::Release signing secrets are missing. Building debug APK; Android may require uninstall before installing future builds."
            gradle :app:assembleDebug --no-daemon
          fi

      - name: Run Android lint
        working-directory: android-app
        continue-on-error: true
        run: gradle :app:lintDebug --no-daemon

      - name: Locate universal APK
        id: locate
        run: |
          # ABI splits + universalApk=true 사용 시 universal 파일명이 환경에 따라 달라질 수 있어 동적 탐색.
          if [ "${HAS_RELEASE_SIGNING}" = "true" ]; then
            APK_DIR="android-app/app/build/outputs/apk/release"
            APK="$(ls "$APK_DIR"/app-universal-release.apk 2>/dev/null || ls "$APK_DIR"/app-release.apk)"
          else
            APK_DIR="android-app/app/build/outputs/apk/debug"
            APK="$(ls "$APK_DIR"/app-universal-debug.apk 2>/dev/null || ls "$APK_DIR"/app-debug.apk)"
          fi
          test -s "$APK"
          echo "apk=$APK" >> "$GITHUB_OUTPUT"

      - name: Verify APK package metadata
        run: |
          APK="${{ steps.locate.outputs.apk }}"
          AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -n 1)"
          "$AAPT" dump badging "$APK" | tee apk-badging.txt
          grep "package: name='com.codex.appraisalcamera'" apk-badging.txt
          grep "launchable-activity: name='com.codex.appraisalcamera.MainActivity'" apk-badging.txt
          grep "versionCode='${APP_VERSION_CODE}'" apk-badging.txt

      - name: Verify APK signature
        run: |
          APK="${{ steps.locate.outputs.apk }}"
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          "$APKSIGNER" verify --print-certs "$APK"

      - name: Prepare APK
        run: cp "${{ steps.locate.outputs.apk }}" appraisalcamera-camera-screen.apk

      - name: Upload APK artifact (PR 검증용)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: appraisalcamera-camera-screen-apk-${{ github.run_number }}
          path: appraisalcamera-camera-screen.apk
          if-no-files-found: error

      - name: Create GitHub Release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="camera-screen-apk-${GITHUB_RUN_NUMBER}"
          gh release create "$TAG" appraisalcamera-camera-screen.apk \
            --title "Camera Screen APK #${GITHUB_RUN_NUMBER}" \
            --notes "카메라 화면에서 바로 토지/건물/제시외와 기호를 선택하는 버전입니다. 릴리즈 서명키가 설정된 뒤부터는 기존 앱을 지우지 않고 APK를 눌러 업데이트 설치할 수 있습니다."
