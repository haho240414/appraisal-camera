<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>자체감정 사진 앱 미리보기</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #e7ebef;
        font-family: "Malgun Gothic", system-ui, sans-serif;
        color: #15171a;
      }

      .phone {
        width: min(390px, 100vw);
        height: min(820px, 100vh);
        position: relative;
        overflow: hidden;
        background:
          linear-gradient(rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.28)),
          url("https://images.unsplash.com/photo-1518005020951-eccb494ad742?auto=format&fit=crop&w=900&q=80");
        background-color: #14171a;
        background-size: cover;
        background-position: center;
        border: 10px solid #111;
        border-radius: 28px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.24);
      }

      .topbar {
        position: absolute;
        inset: 10px 10px auto;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        background: rgba(9, 14, 18, 0.65);
        color: #fff;
        border-radius: 10px;
      }

      .title {
        flex: 1;
      }

      .title strong {
        display: block;
        font-size: 18px;
      }

      .title span {
        display: block;
        margin-top: 3px;
        color: #dce2e6;
        font-size: 11px;
      }

      button {
        min-height: 34px;
        border: 0;
        border-radius: 8px;
        padding: 0 10px;
        background: #f5f7f9;
        color: #15171a;
        font-weight: 800;
        border: 1px solid #d5dce4;
      }

      .panel {
        position: absolute;
        inset: auto auto 12px;
        width: min(390px, calc(100% - 24px));
        left: 50%;
        transform: translateX(-50%) scale(0.86);
        transform-origin: bottom center;
        padding: 10px;
        background: rgba(255, 255, 255, 0.82);
        border: 1px solid rgba(204, 212, 222, 0.7);
        border-radius: 12px;
      }

      .tabs {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }

      .tab {
        display: grid;
        place-items: center;
        min-height: 38px;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        color: #47505b;
        font-weight: 800;
        background: #f7f9fb;
      }

      .tab.active {
        border-color: #116779;
        color: #fff;
        background: #116779;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 108px;
        gap: 8px;
        margin-top: 10px;
      }

      .input {
        min-height: 40px;
        display: flex;
        align-items: center;
        padding: 0 12px;
        border: 1px solid #d9dee7;
        border-radius: 8px;
        background: #fff;
        color: #15171a;
        font-size: 13px;
      }

      .memo {
        margin-top: 10px;
        color: #68707d;
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 12px;
      }

      .capture {
        background: #166c7d;
        color: #fff;
        border-color: #0d5564;
      }

      .footer {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
        color: #68707d;
        font-size: 12px;
      }

      .footer span {
        flex: 1;
      }

      .hint {
        position: absolute;
        left: 18px;
        right: 18px;
        top: 86px;
        padding: 9px 11px;
        background: rgba(0, 0, 0, 0.55);
        color: #fff;
        font-size: 12px;
        text-align: center;
        border-radius: 8px;
      }

      .address {
        margin-bottom: 10px;
        color: #15171a;
      }
    </style>
  </head>
  <body>
    <main class="phone" aria-label="앱 화면 미리보기">
      <div class="topbar">
        <div class="title">
          <strong>자체감정 사진</strong>
          <span>대상과 기호를 고른 뒤 촬영하세요.</span>
        </div>
        <button>인쇄</button>
        <button>PPTX</button>
        <button>설정</button>
      </div>

      <div class="hint">실제 앱에서는 이 영역에 갤럭시 카메라 화면이 바로 표시됩니다.</div>

      <section class="panel">
        <div class="input address">물건지 주소: 서울특별시 ○○구 ○○동 00-00</div>

        <div class="tabs">
          <div class="tab active">토지</div>
          <div class="tab">건물</div>
          <div class="tab">제시외</div>
        </div>

        <div class="row">
          <div class="input">토지 기호 1</div>
          <div class="input">없음</div>
        </div>

        <div class="input memo">사진 설명: 전경, 진입로, 외벽, 내부</div>

        <div class="actions">
          <button class="capture">촬영</button>
          <button>이미지 선택</button>
        </div>

        <div class="footer">
          <span>등록된 사진 0장</span>
          <button>목록</button>
          <button>전체 삭제</button>
        </div>
      </section>
    </main>
  </body>
</html>
